

name: CI

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        
        steps:
          - uses: actions/checkout@v3
            
          - name: Set up python
            uses: actions/setup-python@v4
            with:
                python-version: "3.12"

          - name: Install dependencies
            run: pip install -r requirements.txt
            
          - name: Run tests
            run: pytest booking/tests.py -v
            env:
                DB_USER: test
                SECRET_KEY: test-secret-key
                DEBUG: True
                DB_HOST: 127.0.0.1
                DB_NAME: test
                DB_PASSWORD: test
                DB_PORT: 5432
                REDIS_URL: redis://127.0.0.1:6379/0